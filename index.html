<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校迂回</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #ffffff; 
            color: #202124; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo { font-size: 90px; margin-bottom: 20px; }
        h1 { 
            color: #1a73e8; 
            font-size: 32px; 
            margin-bottom: 8px;
            font-weight: normal;
        }
        input { 
            width: 580px; 
            max-width: 90%; 
            padding: 16px 24px; 
            font-size: 18px; 
            border: 1px solid #dfe1e5; 
            border-radius: 50px; 
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        input:focus { border-color: #1a73e8; box-shadow: 0 1px 8px rgba(26,115,232,0.3); }
        button { 
            margin-top: 25px;
            padding: 14px 36px; 
            font-size: 17px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
        }
        button:hover { background: #185abc; }
        p { color: #5f6368; font-size: 15px; margin: 25px 0 10px; }
    </style>
</head>
<body>
    <div class="logo">🔒</div>
    <h1>学校迂回ブラウザ</h1>
    <p>URLを入力してGo → 履歴にほとんど残りません</p>
    
    <input type="text" id="url" placeholder="https://web.cloudmoonapp.com/ または任意のサイト" value="https://web.cloudmoonapp.com/" autocomplete="off">
    <br>
    <button onclick="goNewTab()">🚀 Go（新しいタブで開く・履歴残さない）</button>

    <script>
        window.onload = function() {
            history.replaceState(null, "学校迂回", "/");  // 履歴偽装
            document.getElementById('url').focus();
        };

        function getUrl() {
            let url = document.getElementById('url').value.trim();
            if (!url) {
                alert("URLを入力してください！");
                return null;
            }
            if (!url.startsWith('http')) url = 'https://' + url;
            return url;
        }

        function goNewTab() {
            const url = getUrl();
            if (!url) return;
            window.open(url, '_blank');   // 新しいタブ → 現在の履歴に追加されない
            document.getElementById('url').value = '';  // 入力クリア
        }

        // Enterキー対応
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') goNewTab();
        });
    </script>
</body>
</html>
