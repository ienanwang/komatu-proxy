<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校迂回</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #ffffff; 
            color: #202124; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { 
            color: #1a73e8; 
            font-size: 32px; 
            margin-bottom: 10px;
            font-weight: normal;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        input { 
            width: 580px; 
            max-width: 90%; 
            padding: 16px 20px; 
            font-size: 18px; 
            border: 1px solid #dfe1e5; 
            border-radius: 24px; 
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }
        input:focus { border-color: #1a73e8; }
        button { 
            margin-top: 20px;
            padding: 12px 32px; 
            font-size: 16px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
        }
        button:hover { background: #185abc; }
        p { color: #5f6368; font-size: 14px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="logo">🔒</div>
    <h1>学校迂回ブラウザ</h1>
    <p>URLを入力してGo → 履歴に残りません</p>
    
    <input type="text" id="url" placeholder="https://web.cloudmoonapp.com/ または任意のサイト" value="https://web.cloudmoonapp.com/" autocomplete="off">
    <br>
    <button onclick="goNewTab()">🚀 Go（新しいタブ・履歴残さない）</button>

    <script>
        // ページロード時に履歴を完全に置き換え（戻るボタンでもproxyページに戻りにくく）
        window.onload = function() {
            if (window.history.replaceState) {
                history.replaceState(null, "学校迂回", "/");
            }
            document.getElementById('url').focus();
        };

        function getUrl() {
            let url = document.getElementById('url').value.trim();
            if (!url) {
                alert("URLを入力してください！");
                return null;
            }
            if (!url.startsWith('http')) url = 'https://' + url;
            return url;
        }

        function goNewTab() {
            const url = getUrl();
            if (!url) return;
            
            // 新しいタブで開く（現在のページの履歴に一切追加されない）
            window.open(url, '_blank');
            
            // 入力欄クリア（痕跡を減らす）
            document.getElementById('url').value = '';
        }

        // Enterキー対応
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') goNewTab();
        });
    </script>
</body>
</html>
