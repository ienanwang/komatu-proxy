<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { 
            font-family: "Google Sans", Arial, sans-serif; 
            background: #ffffff; 
            color: #202124; 
            margin: 0; 
            padding: 60px 20px 20px; 
            text-align: center; 
            height: 100vh;
        }
        .logo { 
            font-size: 110px; 
            margin-bottom: 30px; 
        }
        h1 { 
            color: #1a73e8; 
            font-size: 36px; 
            margin: 0 0 8px 0;
            font-weight: 400;
        }
        input { 
            width: 620px; 
            max-width: 92%; 
            padding: 18px 24px; 
            font-size: 18px; 
            border: 1px solid #dfe1e5; 
            border-radius: 50px; 
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            margin-bottom: 20px;
        }
        input:focus { 
            border-color: #1a73e8; 
            box-shadow: 0 1px 8px rgba(26,115,232,0.4); 
        }
        button { 
            padding: 14px 40px; 
            font-size: 17px; 
            background: #1a73e8; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            margin: 10px;
        }
        button:hover { background: #185abc; }
        .tip { color: #5f6368; font-size: 14px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="logo">🔒</div>
    <h1>komatu proxy</h1>
    <p style="color:#5f6368; font-size:16px;">URLを入力してGoするだけ</p>
    
    <input type="text" id="url" placeholder="https://web.cloudmoonapp.com/" value="https://web.cloudmoonapp.com/" autocomplete="off">
    
    <div>
        <button onclick="goNewTab()">🚀 Go）</button>
    </div>

    <div class="tip">komatu-proxyへようこそ/div>

    <script>
        window.onload = function() {
            history.replaceState(null, "学校", "/");
            document.getElementById('url').focus();
        };

        function getUrl() {
            let u = document.getElementById('url').value.trim();
            if (!u) {
                alert("URLを入力してください！");
                return null;
            }
            if (!u.startsWith('http')) u = 'https://' + u;
            return u;
        }

        function goNewTab() {
            const url = getUrl();
            if (!url) return;
            window.open(url, '_blank');
            document.getElementById('url').value = ''; // 入力クリア
        }

        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goNewTab();
        });
    </script>
</body>
</html>
