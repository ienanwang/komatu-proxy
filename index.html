<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校迂回</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0a0a; 
            color: #0f0; 
            text-align: center; 
            padding: 30px 20px; 
            margin: 0;
        }
        h1 { color: #0f0; font-size: 28px; }
        input { 
            width: 85%; 
            padding: 16px; 
            font-size: 18px; 
            background: #111; 
            color: #0f0; 
            border: 3px solid #0f0; 
            margin: 20px 0;
        }
        button { 
            padding: 16px 40px; 
            font-size: 18px; 
            background: #0f0; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            margin: 10px;
        }
        button:hover { background: #0c0; }
        p { color: #666; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>🏫 学校迂回ブラウザ</h1>
    <p>URLを入力してGo → 履歴に残りません</p>
    
    <input type="text" id="url" placeholder="https://web.cloudmoonapp.com/ または任意のサイト" value="https://web.cloudmoonapp.com/">
    <br>
    <button onclick="goNewTab()">🚀 Go（新しいタブ・履歴残さない）</button>
    <button onclick="goReplace()">🔄 同じタブで開く（履歴置き換え）</button>

    <script>
        // 現在のページの履歴を偽装（目立たなくする）
        window.onload = function() {
            if (window.history.replaceState) {
                history.replaceState(null, "学校迂回", "/");
            }
        };

        function getCleanUrl() {
            let url = document.getElementById('url').value.trim();
            if (!url) {
                alert("URLを入力してください！");
                return null;
            }
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            return url;
        }

        function goNewTab() {
            const url = getCleanUrl();
            if (!url) return;
            window.open(url, '_blank');   // 新しいタブ → 現在の履歴に影響なし
            // 入力欄をクリア（さらに痕跡を減らす）
            document.getElementById('url').value = '';
        }

        function goReplace() {
            const url = getCleanUrl();
            if (!url) return;
            // 同じタブで開くが、履歴を置き換え（戻るボタンで前のページに戻れないように）
            window.location.replace(url);
        }

        // Enterキーでも新しいタブでGo
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') goNewTab();
        });
    </script>
</body>
</html>
