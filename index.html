<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校 任意URL 迂回</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #111; 
            color: #0f0; 
            padding: 20px; 
            text-align: center; 
            margin: 0;
        }
        h1 { color: #0f0; }
        input { 
            width: 80%; 
            padding: 15px; 
            font-size: 18px; 
            margin: 20px 0; 
            background: #222; 
            color: #0f0; 
            border: 2px solid #0f0;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            background: #0f0; 
            color: #000; 
            border: none; 
            cursor: pointer;
        }
        iframe { 
            width: 95%; 
            height: 80vh; 
            border: 2px solid #0f0; 
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🏫 学校迂回ブラウザ</h1>
    <p>URLを入力してGoを押すだけ（Hysteria2接続推奨）</p>
    
    <input type="text" id="url" placeholder="https://web.cloudmoonapp.com/ または 任意のサイト" value="https://web.cloudmoonapp.com/">
    <br>
    <button onclick="go()">🚀 Go</button>
    
    <iframe id="frame" style="display:none;"></iframe>

    <script>
        function go() {
            let url = document.getElementById('url').value.trim();
            if (!url) {
                alert("URLを入力してください！");
                return;
            }
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            const frame = document.getElementById('frame');
            frame.src = url;
            frame.style.display = 'block';
        }

        // EnterキーでもGo
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') go();
        });
    </script>
</body>
</html>
